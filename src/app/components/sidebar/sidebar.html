<aside class="sidebar">
  <div class="sidebar-header">
    <h3>Menú</h3>
  </div>
  <ul class="sidebar-menu">
    <li *ngFor="let item of menuItems" class="menu-item">
      <a 
        [routerLink]="item.ruta" 
        routerLinkActive="active" 
        [routerLinkActiveOptions]="{ exact: item.ruta === '/' }"
        class="menu-link">
        <span class="menu-icon">{{ item.icono }}</span>
        <span class="menu-text">{{ item.nombre }}</span>
      </a>
    </li>
  </ul>
</aside>
